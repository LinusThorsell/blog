services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=web"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@linusthorsell.se}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ORIGIN=https://linusthorsell.se
      - PUBLIC_POCKETBASE_URL=https://pb.linusthorsell.se
      - POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    labels:
      - "traefik.enable=true"
      # Main domain
      - "traefik.http.routers.blog.rule=Host(`linusthorsell.se`) || Host(`www.linusthorsell.se`)"
      - "traefik.http.routers.blog.entrypoints=websecure"
      - "traefik.http.routers.blog.tls.certresolver=letsencrypt"
      - "traefik.http.services.blog.loadbalancer.server.port=3000"
      # WWW redirect to non-www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.blog.middlewares=www-redirect"
    networks:
      - web

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: blog-pocketbase
    restart: unless-stopped
    volumes:
      - ./data/pocketbase:/pb_data
    environment:
      - PB_HOST=0.0.0.0
      - PB_PORT=8090
    labels:
      - "traefik.enable=true"
      # PocketBase on subdomain
      - "traefik.http.routers.pocketbase.rule=Host(`pb.linusthorsell.se`)"
      - "traefik.http.routers.pocketbase.entrypoints=websecure"
      - "traefik.http.routers.pocketbase.tls.certresolver=letsencrypt"
      - "traefik.http.services.pocketbase.loadbalancer.server.port=8090"
    networks:
      - web

volumes:
  letsencrypt:

networks:
  web:
    external: true
